name: Unit Tests

# -----------------------------------------------------------------------
# Triggers:
#   - push  : on every push to every branch (catch issues early)
#   - pull_request: on every PR targeting the main branch (gate keeper)
# -----------------------------------------------------------------------
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false      # Don't cancel other jobs if one Python version fails
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # ---------------------------------------------------------------- #
      # 1. Check out the repository                                       #
      # ---------------------------------------------------------------- #
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------------------------------------------- #
      # 2. Install the uv package manager                                 #
      # ---------------------------------------------------------------- #
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # ---------------------------------------------------------------- #
      # 3. Set up Python via uv (uses .python-version file automatically) #
      # ---------------------------------------------------------------- #
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ---------------------------------------------------------------- #
      # 4. Install project dependencies via uv                           #
      # ---------------------------------------------------------------- #
      - name: Install dependencies
        run: uv sync

      # ---------------------------------------------------------------- #
      # 5. Run unit tests using the CI (SQLite) test settings             #
      #    Note: We use --settings=core.test_settings to override the     #
      #    PostgreSQL database with an in-memory SQLite database.         #
      #    Locally, tests run against the real PostgreSQL DB.             #
      # ---------------------------------------------------------------- #
      - name: Run unit tests
        env:
          # Provide dummy values so settings.py doesn't crash on import.
          # These are never actually used (SQLite overrides the DB).
          DB_NAME: ci_test_db
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_HOST: localhost
          DB_PORT: "5432"
        run: |
          uv run python manage.py test \
            --settings=core.test_settings \
            --verbosity=2 \
            --failfast

      # ---------------------------------------------------------------- #
      # 6. (Optional) Upload test results as an artifact                 #
      # ---------------------------------------------------------------- #
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: "*.xml"
          if-no-files-found: ignore
