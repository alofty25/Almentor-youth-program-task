name: Tests

# -----------------------------------------------------------------------
# Triggers:
#   - push  : every push to every branch
#   - pull_request: every PR targeting main
# -----------------------------------------------------------------------
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  # ===================================================================== #
  # JOB 1: Unit Tests (fast, SQLite, single Python version)              #
  # ===================================================================== #
  unit-tests:
    name: Unit Tests (Python 3.10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync

      # Use SQLite (core/test_settings.py) — no Postgres service needed.
      # Locally, developers run against the real PostgreSQL database.
      - name: Run unit tests
        env:
          DB_NAME: ci_test_db
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_HOST: localhost
          DB_PORT: "5432"
        run: |
          uv run python manage.py test \
            --settings=core.test_settings \
            --verbosity=2 \
            --failfast \
            core projects tasks

  # ===================================================================== #
  # JOB 2: Integration Tests (PostgreSQL service, Python 3.10)           #
  # ===================================================================== #
  integration-tests:
    name: Integration Tests (Python 3.10 + PostgreSQL)
    runs-on: ubuntu-latest
    needs: unit-tests    # only run if unit tests pass

    # Spin up a real PostgreSQL service container for integration tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: integration_test_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync

      # Integration tests run against the real PostgreSQL service.
      # We use the default settings.py (no test_settings override).
      - name: Run integration tests
        env:
          DB_NAME: integration_test_db
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_HOST: localhost
          DB_PORT: "5432"
        run: |
          uv run python manage.py test \
            --verbosity=2 \
            --failfast \
            integration_tests
